<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imajination - Sessionists</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/style.css"> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/assets/js/performance-helpers.js"></script>
  <script src="/assets/js/navbar-notifications.js"></script>
  <script src="/assets/js/navbar-profile-menu.js"></script>
  <style>
    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em;
    }
    #profileDropdown { transition: opacity 0.2s ease, transform 0.2s ease; opacity: 0; transform: translateY(-10px); pointer-events: none; }
    #profileDropdown.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .detail-nav-link {
      display: inline-flex;
      align-items: center;
      height: 4rem;
      border-bottom: 2px solid transparent;
    }
    .detail-nav-link.active {
      color: white;
      border-bottom-color: rgba(239, 68, 68, 0.95);
    }
  </style>
</head>
<body class="bg-neutral-950 text-white antialiased selection:bg-red-500/30 selection:text-white" style="font-family: 'Montserrat', system-ui, sans-serif;">
  
  <div class="bg-global-backdrop fixed inset-0 z-0 pointer-events-none"></div>

  <main class="relative w-full z-10">
    <nav class="fixed top-0 w-full z-50">
      <div class="absolute inset-0 bg-black/30 backdrop-blur-md border-b border-white/10"></div>
      <div class="relative max-w-7xl mx-auto px-6 h-16 flex items-center justify-between gap-4">
        
        <a href="/" class="flex items-center group transition-transform duration-300 hover:scale-105">
          <div class="h-8 w-28 sm:w-32 flex items-center">
            <img src="/assets/images/logo.png" alt="Imajination logo" class="h-full w-full object-contain object-left" onerror="this.style.display='none'">
          </div>
        </a>

        <div class="hidden md:flex items-center gap-10 text-xs font-medium text-white/70 uppercase tracking-[0.14em]">
          <a href="/" class="detail-nav-link hover:text-white/90 transition-colors">Home</a>
          <a href="/pages/browse/Events.html" class="detail-nav-link hover:text-white/90 transition-colors">Events</a>
          <a href="/pages/browse/Artists.html" class="detail-nav-link hover:text-white/90 transition-colors">Artists</a>
          <a href="/pages/browse/Sessionists.html" class="detail-nav-link active text-white hover:text-white/90 transition-colors">Sessionists</a>
          <a href="/pages/browse/Community.html" class="detail-nav-link hover:text-white/90 transition-colors">Community</a>
        </div>

        <div class="flex items-center gap-3 relative">
          <div id="authLoggedOut" class="flex items-center gap-3">
            <a href="/pages/auth/login.html" class="hidden sm:inline-flex items-center justify-center px-4 py-2 rounded-lg text-xs font-medium uppercase tracking-[0.12em] text-white/80 hover:text-white transition-colors">Sign in</a>
            <a href="/pages/auth/signuproles.html" class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-red-600 text-white text-xs font-medium uppercase tracking-[0.12em] hover:bg-red-500 transition-colors shadow-[0_10px_30px_-12px_rgba(239,68,68,0.65)]">Get started</a>
          </div>

          <div id="authLoggedIn" class="hidden relative flex items-center gap-2">
            <button id="globalNotificationBellBtn" type="button" class="relative mr-2 flex items-center justify-center w-9 h-9 rounded-full bg-white/5 border border-white/10 text-white/80 hover:bg-white/10 transition-colors">
              <i data-lucide="bell" class="w-4 h-4"></i>
              <span id="globalNotificationBellBadge" class="hidden absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-red-500 text-white text-[10px] font-bold items-center justify-center">0</span>
            </button>
            <div id="globalNotificationBellDropdown" class="hidden absolute top-full right-12 mt-3 w-80 bg-neutral-900 border border-white/10 rounded-2xl shadow-2xl overflow-hidden z-50">
              <div class="px-4 py-3 border-b border-white/10 bg-black/40 flex items-center justify-between">
                <p class="text-sm font-bold text-white">Notifications</p>
                <span id="globalNotificationBellCount" class="text-[10px] uppercase tracking-widest text-red-300">0 new</span>
              </div>
              <div id="globalNotificationBellList" class="max-h-96 overflow-y-auto p-2 space-y-2">
                <div class="p-4 text-center text-sm text-white/50">Loading notifications...</div>
              </div>
            </div>
            <button id="profileBtn" class="flex items-center justify-center w-9 h-9 rounded-full bg-red-600/20 border border-red-500/50 text-red-500 font-bold uppercase hover:bg-red-600/30 transition-colors focus:outline-none overflow-hidden cursor-pointer">
              <span id="profileInitial">A</span>
              <img id="navProfilePic" src="" class="w-full h-full object-cover hidden">
            </button>
            
            <div id="profileDropdown" class="absolute right-0 mt-3 w-48 bg-neutral-900 border border-white/10 rounded-xl shadow-2xl overflow-hidden z-50">
              <div class="px-4 py-3 border-b border-white/10 bg-black/40">
                <p id="dropdownName" class="text-sm font-bold text-white truncate">User Name</p>
                <p id="dropdownRole" class="text-[10px] uppercase tracking-wider text-white/50 mt-0.5">Role</p>
              </div>
              <div class="p-2 flex flex-col gap-1">
                <a id="dashboardLink" href="#" class="flex items-center gap-2 px-3 py-2 text-xs font-medium text-white/70 hover:text-white hover:bg-white/5 rounded-lg transition-colors">
                  <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i> Dashboard
                </a>
                <a id="profilePageLink" href="#" class="hidden items-center gap-2 px-3 py-2 text-xs font-medium text-white/70 hover:text-white hover:bg-white/5 rounded-lg transition-colors">
                  <i data-lucide="user-round" class="w-3.5 h-3.5"></i> Profile Page
                </a>
              </div>
              <div class="p-2 border-t border-white/10">
                <button onclick="handleLogout()" class="w-full flex items-center gap-2 px-3 py-2 text-xs font-medium text-red-400 hover:text-red-300 hover:bg-red-500/10 rounded-lg transition-colors">
                  <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Sign out
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

  <main class="relative z-10 w-full pb-24 mt-24">
    <section class="max-w-7xl mx-auto px-6">
      <div class="mb-10">
        <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest mb-1">Discover</p>
        <h2 class="text-4xl font-extrabold tracking-tight text-white">Sessionists</h2>
      </div>

      <div class="bg-black/30 border border-white/[0.08] rounded-2xl p-3 mb-8">
        <div class="flex flex-col sm:flex-row sm:flex-wrap sm:items-center gap-2">
          <div class="relative flex-1 min-w-[160px]">
            <i data-lucide="search" class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-white/35 pointer-events-none"></i>
            <input type="text" id="searchInput" placeholder="Search sessionists..." class="w-full pl-9 pr-3 py-2.5 rounded-xl bg-white/[0.04] border border-white/[0.08] text-sm text-white focus:outline-none focus:border-red-500/40 transition-colors">
          </div>
          <select id="genreSelect" class="w-full sm:w-auto px-3 py-2.5 bg-white/[0.04] border border-white/[0.08] rounded-xl text-sm text-white/80 focus:outline-none focus:border-red-500/40 appearance-none cursor-pointer">
            <option value="">Instrument</option>
            <option value="lead guitar">Lead Guitar</option>
            <option value="rhythm guitar">Rhythm Guitar</option>
            <option value="drums">Drums</option>
            <option value="bass">Bass</option>
            <option value="keyboard">Keyboard</option>
            <option value="vocalist">Vocalist</option>
          </select>
          <select id="sessionTypeSelect" class="w-full sm:w-auto px-3 py-2.5 bg-white/[0.04] border border-white/[0.08] rounded-xl text-sm text-white/80 focus:outline-none focus:border-red-500/40 appearance-none cursor-pointer">
            <option value="">Session Type</option>
            <option value="solo">Solo</option>
            <option value="duo">Duo</option>
            <option value="trio">Trio</option>
            <option value="band">Band</option>
            <option value="group">Group</option>
          </select>
          <select id="popularitySelect" class="w-full sm:w-auto px-3 py-2.5 bg-white/[0.04] border border-white/[0.08] rounded-xl text-sm text-white/80 focus:outline-none focus:border-red-500/40 appearance-none cursor-pointer">
            <option value="">Popularity</option>
            <option value="highest-rated">Highest Rated</option>
            <option value="most-reviewed">Most Reviewed</option>
          </select>
          <select id="availabilitySelect" class="w-full sm:w-auto px-3 py-2.5 bg-white/[0.04] border border-white/[0.08] rounded-xl text-sm text-white/80 focus:outline-none focus:border-red-500/40 appearance-none cursor-pointer">
            <option value="">Availability</option>
            <option value="available">Available</option>
            <option value="unavailable">Unavailable</option>
          </select>
          <select id="priceRangeSelect" class="w-full sm:w-auto px-3 py-2.5 bg-white/[0.04] border border-white/[0.08] rounded-xl text-sm text-white/80 focus:outline-none focus:border-red-500/40 appearance-none cursor-pointer">
            <option value="">Price Range</option>
            <option value="0-5000">₱0 – 5K</option>
            <option value="5001-15000">₱5K – 15K</option>
            <option value="15001-30000">₱15K – 30K</option>
            <option value="30001+">₱30K+</option>
          </select>
          <div class="flex items-center gap-2 sm:ml-auto">
            <button type="button" id="clearBtn" class="px-4 py-2.5 rounded-xl bg-white/[0.04] border border-white/[0.08] text-xs font-bold uppercase tracking-wider text-white/55 hover:text-white hover:bg-white/[0.08] transition-colors">Clear</button>
            <button type="button" id="searchBtn" class="px-4 py-2.5 rounded-xl bg-red-600 text-white text-xs font-bold uppercase tracking-wider hover:bg-red-500 transition-colors shadow-lg">Apply</button>
          </div>
        </div>
      </div>

      <div id="sessionistsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
         <p class="col-span-4 text-center py-10 text-white/50"><i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-4 text-red-500"></i> Loading sessionists...</p>
      </div>
    </section>
  </main>
  
  <script>
    lucide.createIcons();

    function initializeSessionistsNavbarIdentity() {
      const firstName = (localStorage.getItem('userFirstName') || '').trim();
      const username = (localStorage.getItem('username') || '').trim();
      const role = (localStorage.getItem('userRole') || '').trim();
      const userId = (localStorage.getItem('userId') || '').trim();
      const storedProfilePicture = localStorage.getItem('userProfilePicture');
      const displayName = (localStorage.getItem('userDisplayName') || '').trim() || firstName || username || role || 'User';

      if (!(userId && role)) return;

      document.getElementById('authLoggedOut').classList.add('hidden');
      document.getElementById('authLoggedIn').classList.remove('hidden');
      document.getElementById('profileInitial').innerText = displayName.charAt(0).toUpperCase();
      document.getElementById('dropdownName').innerText = displayName;
      document.getElementById('dropdownRole').innerText = role;

      if (storedProfilePicture) {
        const picEl = document.getElementById('navProfilePic');
        picEl.src = storedProfilePicture;
        picEl.classList.remove('hidden');
        document.getElementById('profileInitial').classList.add('hidden');
      }

      const dashLink = document.getElementById('dashboardLink');
      const profilePageLink = document.getElementById('profilePageLink');
      if(role === 'Customer') dashLink.href = '/pages/dashboards/CustomerDashboard.html';
      else if(role === 'Organizer') dashLink.href = '/pages/dashboards/OrganizerDashboard.html';
      else if(role === 'Artist') dashLink.href = '/pages/dashboards/ArtistDashboard.html';
      else if(role === 'Sessionist') dashLink.href = '/pages/dashboards/SessionistDashboard.html';
      else if(role === 'Admin') dashLink.href = '/pages/dashboards/ProfileAdmin.html';

      if (role === 'Customer' && profilePageLink) {
        profilePageLink.href = '/pages/dashboards/CustomerDashboard.html?view=profile';
        profilePageLink.classList.remove('hidden');
        profilePageLink.classList.add('flex');
      }

      if (!userId) return;
      const endpoint = role === 'Artist'
        ? 'artist'
        : role === 'Sessionist'
          ? 'sessionist'
          : role === 'Customer'
            ? 'customer'
            : '';
      if (!endpoint) return;

      fetch(`/api/${endpoint}/${userId}`)
        .then((res) => res.ok ? res.json() : null)
        .then((profile) => {
          if (!profile?.profilePicture) return;
          const picEl = document.getElementById('navProfilePic');
          picEl.src = profile.profilePicture;
          picEl.classList.remove('hidden');
          document.getElementById('profileInitial').classList.add('hidden');
          localStorage.setItem('userProfilePicture', profile.profilePicture);
        })
        .catch(() => {});
    }

    document.addEventListener('DOMContentLoaded', () => {
      initializeSessionistsNavbarIdentity();
      fetchSessionists();
      if (window.initGlobalNavbarNotifications) window.initGlobalNavbarNotifications();
    });

    const profileBtn = document.getElementById('profileBtn');
    const profileDropdown = document.getElementById('profileDropdown');
    if (profileBtn) {
      profileBtn.addEventListener('click', () => profileDropdown.classList.toggle('show'));
      document.addEventListener('click', (e) => {
        if (!profileBtn.contains(e.target) && !profileDropdown.contains(e.target)) profileDropdown.classList.remove('show');
      });
    }

    function handleLogout() { localStorage.clear(); window.location.href = '/pages/auth/login.html'; }

    let allSessionists = [];
    const sessionistsCacheKey = 'sessionistsPageCacheV1';
    const sessionistsCacheTtlMs = 2 * 60 * 1000;
    async function fetchWithTimeout(url, options = {}, timeoutMs = 15000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function readCachedSessionists() {
      try {
        const raw = sessionStorage.getItem(sessionistsCacheKey);
        if (!raw) return null;

        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.items) || typeof parsed.savedAt !== 'number') return null;
        if (Date.now() - parsed.savedAt > sessionistsCacheTtlMs) return null;

        return parsed.items;
      } catch {
        return null;
      }
    }

    function writeCachedSessionists(items) {
      try {
        sessionStorage.setItem(sessionistsCacheKey, JSON.stringify({
          savedAt: Date.now(),
          items
        }));
      } catch {
        // Ignore cache errors and keep the page usable.
      }
    }

    function renderSessionistLoadingCards() {
      const grid = document.getElementById('sessionistsGrid');
      if (!grid) return;
      grid.innerHTML = Array.from({ length: 8 }, () => `
        <article class="flex flex-col items-center p-4 bg-[#181414] rounded-3xl border border-white/5 shadow-lg animate-pulse">
          <div class="w-24 h-24 rounded-full bg-white/10 mb-4"></div>
          <div class="h-6 w-2/3 rounded-xl bg-white/10"></div>
          <div class="h-3 w-1/2 mt-3 rounded-full bg-white/10"></div>
          <div class="mt-3 flex gap-2">
            <div class="h-6 w-16 rounded-full bg-white/10"></div>
            <div class="h-6 w-16 rounded-full bg-white/10"></div>
          </div>
          <div class="mt-4 h-3 w-24 rounded-full bg-white/10"></div>
          <div class="mt-4 grid grid-cols-2 gap-3 w-full">
            <div class="h-16 rounded-2xl bg-white/10"></div>
            <div class="h-16 rounded-2xl bg-white/10"></div>
          </div>
          <div class="mt-4 h-10 w-full rounded-2xl bg-white/10"></div>
        </article>
      `).join('');
    }

    function getEventBookingQuery() {
      const params = new URLSearchParams(window.location.search);
      const eventId = params.get('eventId');
      const eventTitle = params.get('eventTitle');
      if (!eventId) return '';

      const next = new URLSearchParams();
      next.set('eventId', eventId);
      if (eventTitle) next.set('eventTitle', eventTitle);
      return `&${next.toString()}`;
    }

    function parseGenres(genres) {
      return String(genres || '')
        .split(',')
        .map(value => value.trim())
        .filter(Boolean);
    }

    function formatSessionistTypeLabel(sessionist) {
      const category = resolveSessionistType(sessionist);
      if (category === 'solo') return 'Solo Sessionist';
      if (category === 'duo') return 'Duo Sessionist';
      if (category === 'trio') return 'Trio Sessionist';
      return category ? `${category.charAt(0).toUpperCase()}${category.slice(1)}` : 'Sessionist';
    }

    function getVerificationBadgeMarkup(verificationStatus) {
      const normalized = String(verificationStatus || '').trim().toLowerCase();
      if (normalized === 'approved') return '';
      if (normalized === 'pending') {
        return `<span class="px-2.5 py-1 rounded-full bg-amber-500/12 border border-amber-400/25 text-[8px] font-bold uppercase tracking-widest text-amber-200">Verification Pending</span>`;
      }
      return `<span class="px-2.5 py-1 rounded-full bg-white/5 border border-white/10 text-[8px] font-bold uppercase tracking-widest text-white/55">Not Yet Verified</span>`;
    }

    async function fetchSessionists() {
      const grid = document.getElementById('sessionistsGrid');
      const cachedSessionists = readCachedSessionists();

      if (cachedSessionists && cachedSessionists.length > 0) {
        allSessionists = cachedSessionists;
        renderSessionists(cachedSessionists);
      }

      try {
        if (!cachedSessionists) {
          renderSessionistLoadingCards();
        }

        const response = await fetchWithTimeout('/api/sessionist/all');
        const payload = await response.json().catch(() => null);
        if (!response.ok || !Array.isArray(payload)) throw new Error((payload && payload.message) || "Failed to load sessionists.");
        
        allSessionists = payload;
        writeCachedSessionists(allSessionists);
        if (allSessionists.length === 0) {
            grid.innerHTML = `<p class="col-span-4 text-white/50 text-center py-10">No sessionists registered yet.</p>`;
            return;
        }
        renderSessionists(allSessionists);
      } catch (error) {
        if (cachedSessionists && cachedSessionists.length > 0) return;
        grid.innerHTML = `<div class="col-span-4 flex flex-col items-center py-10"><p class="text-red-500 font-bold mb-2">Failed to load sessionists.</p></div>`;
      }
    }

    function renderSessionists(data) {
        const grid = document.getElementById('sessionistsGrid');
        grid.innerHTML = '';
        if (data.length === 0) return grid.innerHTML = `<p class="col-span-4 text-white/50 text-center py-10">No sessionists match your search.</p>`;

        const eventBookingQuery = getEventBookingQuery();
        const isOrganizerEventFlow = (localStorage.getItem('userRole') || '') === 'Organizer' && !!eventBookingQuery;
        grid.innerHTML = data.map(s => {
          const isAvailable = s.isAvailable !== false;
          const isVerified = !!s.isVerified || String(s.verificationStatus || '').trim().toLowerCase() === 'approved';
          const sessionistGenres = parseGenres(s.genres).slice(0, 2);
          const sessionistTypeLabel = formatSessionistTypeLabel(s);
          const averageRating = Number(s.averageRating || 0).toFixed(1);
          const reviewCount = Number(s.reviewCount || 0);
          const detailHref = `/pages/details/SessionistDetailsPage.html?id=${s.id}${eventBookingQuery}`;
          return `
            <div class="group flex flex-col items-center p-4 bg-[#181414] rounded-3xl border border-white/5 hover:border-white/10 hover:shadow-2xl transition-all text-center shadow-lg cursor-pointer" data-detail-href="${detailHref}">
              <div class="relative w-24 h-24 rounded-full bg-black/40 border border-white/10 flex items-center justify-center mb-4 overflow-hidden shadow-inner pointer-events-none">
                <img src="${s.profilePicture}" class="absolute inset-0 w-full h-full object-cover z-10" onerror="this.style.display='none'">
                <i data-lucide="headphones" class="w-8 h-8 text-white/50 relative z-0"></i>
              </div>
              <h4 class="mt-4 text-xl font-extrabold tracking-tight text-white line-clamp-1 pointer-events-none">${s.displayName}</h4>
              <p class="text-[9px] font-bold text-red-300 mt-2 tracking-[0.18em] uppercase pointer-events-none">${sessionistTypeLabel}</p>
              <div class="mt-3 flex flex-wrap justify-center gap-2 min-h-[24px]">
                ${sessionistGenres.length
                  ? sessionistGenres.map(genre => `<button type="button" data-filter-genre="${genre.toLowerCase()}" class="px-2.5 py-1 rounded-full bg-white/5 border border-white/10 text-[8px] font-bold uppercase tracking-widest text-white/65 hover:bg-red-500/20 hover:border-red-500/40 hover:text-white transition-colors cursor-pointer">${genre}</button>`).join('')
                  : `<span class="px-2.5 py-1 rounded-full bg-white/5 border border-white/10 text-[8px] font-bold uppercase tracking-widest text-white/40 pointer-events-none">Sessionist</span>`}
                ${getVerificationBadgeMarkup(isVerified ? 'approved' : (s.verificationStatus || ''))}
              </div>
              <p class="mt-4 text-[10px] font-bold uppercase tracking-[0.18em] pointer-events-none ${(isAvailable && isVerified) ? 'text-emerald-300' : 'text-white/35'}">${(isAvailable && isVerified) ? 'Available' : isVerified ? 'Unavailable' : 'Not Bookable Yet'}</p>
              <div class="mt-4 grid grid-cols-2 gap-3 w-full pointer-events-none">
                <div class="rounded-2xl border border-white/5 bg-black/30 px-3 py-3 text-left">
                  <p class="text-[8px] uppercase tracking-[0.18em] text-white/35">Rating</p>
                  <p class="mt-1 text-xl font-extrabold text-white">${averageRating}</p>
                </div>
                <div class="rounded-2xl border border-white/5 bg-black/30 px-3 py-3 text-left">
                  <p class="text-[8px] uppercase tracking-[0.18em] text-white/35">Reviews</p>
                  <p class="mt-1 text-xl font-extrabold text-white">${reviewCount}</p>
                </div>
              </div>
              <div class="w-full mt-4 px-4 py-2.5 rounded-2xl bg-white/5 border border-white/10 text-[11px] font-semibold uppercase tracking-[0.16em] text-white group-hover:bg-white/10 group-hover:border-white/20 transition-colors pointer-events-none">${isOrganizerEventFlow ? 'Book For Event' : 'View Profile'}</div>
            </div>
          `;
        }).join('');
        lucide.createIcons();
    }

      function resolveSessionistType(sessionist) {
        const category = (sessionist.talentCategory || '').toLowerCase();
        if (category) return category;
        const members = (sessionist.memberNames || '')
          .split(',')
          .map(n => n.trim())
          .filter(Boolean);
        if (members.length === 1) return 'solo';
        if (members.length === 2) return 'duo';
        if (members.length === 3) return 'trio';
        if (members.length > 3) return 'group';
        return '';
      }

      function matchesPriceRange(priceValue, selectedRange) {
        const price = Number(priceValue || 0);
        if (!selectedRange) return true;
        if (selectedRange === '0-5000') return price >= 0 && price <= 5000;
        if (selectedRange === '5001-15000') return price >= 5001 && price <= 15000;
        if (selectedRange === '15001-30000') return price >= 15001 && price <= 30000;
        if (selectedRange === '30001+') return price >= 30001;
        return true;
      }

      function applySessionistFilters() {
          const query = document.getElementById('searchInput').value.toLowerCase();
          const genre = document.getElementById('genreSelect').value.toLowerCase();
          const sessionType = document.getElementById('sessionTypeSelect').value.toLowerCase();
          const popularity = document.getElementById('popularitySelect').value;
          const availability = document.getElementById('availabilitySelect').value;
          const priceRange = document.getElementById('priceRangeSelect').value;
          let filtered = allSessionists.filter(a => {
              const matchName = !query || a.displayName.toLowerCase().includes(query) || (a.genres && a.genres.toLowerCase().includes(query));
              const matchGenre = !genre || (a.genres && a.genres.toLowerCase().includes(genre));
              const resolvedType = resolveSessionistType(a);
              const matchType = !sessionType || resolvedType.includes(sessionType);
              const isAvailable = a.isAvailable !== false;
              const matchAvailability = !availability || (availability === 'available' ? isAvailable : !isAvailable);
              const matchPrice = matchesPriceRange(a.basePrice, priceRange);
              return matchName && matchGenre && matchType && matchAvailability && matchPrice;
          });

          if (popularity === 'highest-rated') {
            filtered = [...filtered].sort((a, b) => Number(b.averageRating || 0) - Number(a.averageRating || 0) || Number(b.reviewCount || 0) - Number(a.reviewCount || 0));
          } else if (popularity === 'most-reviewed') {
            filtered = [...filtered].sort((a, b) => Number(b.reviewCount || 0) - Number(a.reviewCount || 0) || Number(b.averageRating || 0) - Number(a.averageRating || 0));
          }

          renderSessionists(filtered);
      }

      document.getElementById('searchBtn').addEventListener('click', applySessionistFilters);

      document.getElementById('clearBtn').addEventListener('click', () => {
          document.getElementById('searchInput').value = "";
          document.getElementById('genreSelect').value = "";
          document.getElementById('sessionTypeSelect').value = "";
          document.getElementById('popularitySelect').value = "";
          document.getElementById('availabilitySelect').value = "";
          document.getElementById('priceRangeSelect').value = "";
          applySessionistFilters();
      });

      document.getElementById('searchInput').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') applySessionistFilters();
      });

      document.getElementById('sessionistsGrid').addEventListener('click', (e) => {
          const tag = e.target.closest('[data-filter-genre]');
          if (tag) {
              document.getElementById('genreSelect').value = tag.dataset.filterGenre;
              applySessionistFilters();
              return;
          }
          const card = e.target.closest('[data-detail-href]');
          if (card) window.location.href = card.dataset.detailHref;
      });
  </script>
</body>
</html>
