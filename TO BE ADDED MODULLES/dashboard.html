<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Imajination - Dashboards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-neutral-950 text-white antialiased" style="font-family: 'Montserrat', sans-serif;">
  <nav class="w-full h-16 flex items-center px-6 border-b border-white/10 bg-black/30 sticky top-0 z-50">
    <a href="index.html" class="font-semibold text-lg uppercase tracking-tight">Imajination Tools</a>
    <div class="ml-auto flex gap-4 text-xs font-semibold uppercase text-white/70">
      <a href="#organizer" class="hover:text-white">Organizer</a>
      <a href="messages.html" class="hover:text-white">Inbox</a>
      <a href="#customer" class="hover:text-white">Tickets</a>
      <a href="#scanner" class="hover:text-white">Scanner</a>
      <a href="#admin" class="hover:text-white">Admin</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-12 space-y-24">
    
    <section id="organizer">
      <h2 class="text-3xl font-extrabold mb-8">Organizer Dashboard</h2>
      <div class="rounded-3xl border border-white/10 bg-white/5 p-8 max-w-4xl">
        <h3 class="text-2xl font-semibold mb-6">Create Event</h3>
        <form class="grid grid-cols-2 gap-5">
          <input type="text" placeholder="Event title" class="col-span-2 px-4 py-3 bg-black/40 border border-white/10 rounded-xl">
          <input type="datetime-local" class="px-4 py-3 bg-black/40 border border-white/10 rounded-xl [color-scheme:dark]">
          <input type="text" placeholder="Venue" class="px-4 py-3 bg-black/40 border border-white/10 rounded-xl">
          <input type="number" placeholder="Ticket Price" class="col-span-2 px-4 py-3 bg-black/40 border border-white/10 rounded-xl">
          <button class="col-span-2 py-3 bg-red-600 text-xs font-semibold uppercase rounded-xl hover:bg-red-500">Publish Event</button>
        </form>
      </div>
    </section>

    <section id="customer">
      <h2 class="text-3xl font-extrabold mb-8">My Tickets</h2>
      <div class="rounded-3xl border border-white/10 bg-white/5 overflow-hidden max-w-md p-6 bg-black/40 flex justify-between">
        <div>
          <p class="text-xs uppercase text-white/60">Valid Ticket</p>
          <p class="font-semibold text-white mt-1">Neon Nights Festival</p>
        </div>
        <div class="w-16 h-16 bg-white rounded-xl p-1">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TKT123" class="w-full h-full object-contain mix-blend-multiply" alt="QR">
        </div>
      </div>
    </section>

    <section id="scanner">
      <h2 class="text-3xl font-extrabold mb-8 text-center">Event Entry Validation</h2>
      <div class="max-w-md mx-auto rounded-3xl border border-green-500/30 bg-green-500/5 p-8 text-center">
        <h3 class="text-2xl font-semibold text-white">Entry Approved</h3>
        <p class="text-green-400 text-sm mt-1">Ticket Marked as "Used"</p>
      </div>
    </section>

    <section id="admin">
      <h2 class="text-3xl font-extrabold mb-8">Admin Overview</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
          <p class="text-xs uppercase text-white/60">Ticket Sales</p>
          <p class="text-3xl font-semibold">₱144,200</p>
        </div>
        <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
          <p class="text-xs uppercase text-white/60">Total Users</p>
          <p class="text-3xl font-semibold">1,289</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
