<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Imajination - QR Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-neutral-950 text-white antialiased" style="font-family: 'Montserrat', sans-serif;">
  
  <div class="bg-dashboard-backdrop"></div>

  <nav class="relative z-10 w-full h-16 flex items-center px-6 border-b border-white/10 bg-black/30 backdrop-blur-md">
    <a href="OrganizerDashboard.html" class="font-semibold text-lg uppercase flex items-center gap-2">
      <i data-lucide="arrow-left" class="w-5 h-5"></i> Back to Organizer
    </a>
  </nav>
  
  <main class="relative z-10 max-w-md mx-auto px-6 py-24">
    <h2 class="text-3xl font-extrabold mb-8 text-center text-white">Scan Tickets</h2>
    <div class="aspect-square bg-black border border-white/10 rounded-3xl flex items-center justify-center relative mb-8 shadow-[0_10px_40px_-10px_rgba(0,0,0,0.5)]">
      <div class="w-3/4 h-3/4 border-2 border-red-500 rounded-2xl relative overflow-hidden">
        <div class="absolute w-full h-1 bg-red-500 top-1/2 shadow-[0_0_10px_red]"></div>
      </div>
    </div>
    <div class="rounded-3xl border border-green-500/30 bg-green-500/5 p-6 text-center backdrop-blur-sm">
      <h3 class="text-2xl font-semibold text-white">Entry Approved</h3>
      <p class="text-green-400 text-sm mt-1">Ticket Marked as "Used"</p>
    </div>
  </main>
  <script>lucide.createIcons();</script>
</body>
</html>
